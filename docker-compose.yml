services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ilmai-postgres
    environment:
      POSTGRES_DB: ilmai
      POSTGRES_USER: ilmai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-IlmAI_Dev_2026!}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilmai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ilmai-backend
    ports:
      - "5030:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Database=ilmai;Username=ilmai;Password=${POSTGRES_PASSWORD:-IlmAI_Dev_2026!}"
      AppOptions__AIServerHost: "http://ai-server:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ai-server:
    build:
      context: .
      dockerfile: docker/ai-server.Dockerfile
    container_name: ilmai-ai-server
    ports:
      - "5031:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Database=ilmai;Username=ilmai;Password=${POSTGRES_PASSWORD:-IlmAI_Dev_2026!}"
      OpenAI__ApiKey: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ilmai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
